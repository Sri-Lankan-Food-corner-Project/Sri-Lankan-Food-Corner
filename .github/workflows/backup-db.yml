name: Nightly DB backup

on:
  schedule:
    # 18:00 UTC == 03:00 KST — quiet time for a Korean-facing shop.
    - cron: '0 18 * * *'
  workflow_dispatch: # allows manual "Run workflow" from the Actions tab

jobs:
  dump-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dump database (Postgres 18 via Docker)
        # Use the official postgres:18 image so pg_dump always matches Neon's
        # server version. No apt fiddling, no PATH surprises.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          STAMP=$(date -u +%Y-%m-%d_%H%M%S)
          echo "STAMP=$STAMP" >> $GITHUB_ENV
          docker run --rm \
            -e PGCONNECT_TIMEOUT=30 \
            -e DATABASE_URL="$DATABASE_URL" \
            postgres:18-alpine \
            pg_dump --no-owner --no-acl -Fc "$DATABASE_URL" \
            > "food-corner-$STAMP.dump"
          ls -lh "food-corner-$STAMP.dump"
          # Sanity check — pg_dump exits 0 on failure sometimes; ensure file has content
          test -s "food-corner-$STAMP.dump" || { echo 'Dump file is empty'; exit 1; }

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          aws s3 cp "food-corner-${STAMP}.dump" \
            "s3://${R2_BACKUP_BUCKET}/daily/food-corner-${STAMP}.dump" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Prune backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          aws s3 ls "s3://${R2_BACKUP_BUCKET}/daily/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            | while read -r line; do
              filename=$(echo "$line" | awk '{print $4}')
              [ -z "$filename" ] && continue
              filedate=$(echo "$filename" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
              if [ -n "$filedate" ] && [ "$filedate" \< "$CUTOFF" ]; then
                echo "Deleting old backup: $filename"
                aws s3 rm "s3://${R2_BACKUP_BUCKET}/daily/$filename" \
                  --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
              fi
            done
