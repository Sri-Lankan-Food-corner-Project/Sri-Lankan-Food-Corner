<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#2B4B1F" />

		<!-- Favicons -->
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Google Fonts. Loaded in <head> (not via @import in CSS) so the
		     browser can fetch the stylesheet + font files in parallel with the
		     app's CSS bundle instead of waiting for it to parse. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+Sinhala:wght@400;500;700&display=swap"
		/>

		<style>
			/* Inline so the sand background is applied before any CSS bundle
			   loads — eliminates first-paint and iOS swipe-back white flash. */
			html,
			body {
				background-color: #f3f1ea;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
