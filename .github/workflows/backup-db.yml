name: Nightly DB backup

on:
  schedule:
    # 18:00 UTC == 03:00 KST — quiet time for a Korean-facing shop.
    - cron: '0 18 * * *'
  workflow_dispatch: # allows manual "Run workflow" from the Actions tab

jobs:
  dump-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Postgres 17 client
        # Neon runs Postgres 17 by default. Ubuntu's default `postgresql-client`
        # is older and will error with "server version mismatch" on newer features.
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
          echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          STAMP=$(date -u +%Y-%m-%d_%H%M%S)
          echo "STAMP=$STAMP" >> $GITHUB_ENV
          # --no-owner --no-acl: Neon uses its own role model, don't restore ownership
          # -Fc: custom (compressed) format — smaller and restore-friendly with pg_restore
          pg_dump --no-owner --no-acl -Fc "$DATABASE_URL" > "food-corner-$STAMP.dump"
          ls -lh "food-corner-$STAMP.dump"

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          aws s3 cp "food-corner-${STAMP}.dump" \
            "s3://${R2_BACKUP_BUCKET}/daily/food-corner-${STAMP}.dump" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Prune backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          aws s3 ls "s3://${R2_BACKUP_BUCKET}/daily/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            | while read -r line; do
              filename=$(echo "$line" | awk '{print $4}')
              [ -z "$filename" ] && continue
              filedate=$(echo "$filename" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
              if [ -n "$filedate" ] && [ "$filedate" \< "$CUTOFF" ]; then
                echo "Deleting old backup: $filename"
                aws s3 rm "s3://${R2_BACKUP_BUCKET}/daily/$filename" \
                  --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
              fi
            done
